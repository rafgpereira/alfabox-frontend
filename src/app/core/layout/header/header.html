<header>
  <div class="left-items">
    <p-button icon="pi pi-bars" (click)="onToggleSidebar()" />
    <div class="title">
      <img src="../../../../assets/logo-inverse.png" alt="Logo Alfabox" class="logo" />
      <span>ALFABOX</span>
    </div>
  </div>
  <div class="right-items">
    <span class="user-name">{{ userName }}</span>
    <p-button icon="pi pi-sign-out" pTooltip="Sair" tooltipPosition="bottom" (click)="onLogout()" />
  </div>
</header>
