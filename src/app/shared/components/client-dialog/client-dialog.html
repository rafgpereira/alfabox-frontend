<p-dialog
  [header]="header"
  [modal]="true"
  [(visible)]="visible"
  (visibleChange)="visibleChange.emit($event)"
  [style]="{ width: '36rem' }"
  [draggable]="false"
  [resizable]="false"
  [focusOnShow]="false"
>
  <form [formGroup]="form" class="dialog-form">

    <!-- Nome -->
    <div class="form-field">
      <p-floatlabel variant="on" class="full-width-control">
        <input pInputText fluid id="cd_name" formControlName="name" [invalid]="isInvalid('name')" />
        <label for="cd_name">Nome do Cliente</label>
      </p-floatlabel>
      <app-error-message [control]="form.get('name')" />
    </div>

    <!-- Tipo de Pessoa + Documento -->
    <div class="person-doc-row">
      <p-selectbutton
        [options]="personTypeOptions"
        formControlName="personType"
        optionLabel="label"
        optionValue="value"
        [allowEmpty]="false"
      />
      <div class="form-field doc-field">
        <p-floatlabel variant="on" class="full-width-control">
          <input
            pInputText
            fluid
            id="cd_document"
            formControlName="document"
            [mask]="documentMask"
            [dropSpecialCharacters]="true"
            [invalid]="isInvalid('document')"
            style="text-transform: uppercase"
          />
          <label for="cd_document">{{ documentLabel }}</label>
        </p-floatlabel>
        <app-error-message [control]="form.get('document')" />
      </div>
    </div>

    <!-- Telefones -->
    <div class="phones-field">
      <app-multi-input
        formControlName="phones"
        label="Telefone"
        [min]="1"
        [max]="3"
        masks="(00) 0000-0000||(00) 00000-0000"
        scrollHeight="149px"
      />
    </div>

    <!-- Ativo/Inativo — apenas em edição quando allowStatusToggle=true -->
    @if (mode === 'edit' && allowStatusToggle) {
      <div class="toggle-field">
        <label for="cd_active">Ativo</label>
        <p-toggleswitch formControlName="isActive" inputId="cd_active" />
      </div>
    }

  </form>

  <ng-template #footer>
    <div class="dialog-footer">
      <p-button
        label="Cancelar"
        icon="pi pi-times"
        severity="secondary"
        [outlined]="true"
        (click)="close()"
      />
      <p-button
        label="Salvar"
        icon="pi pi-save"
        [disabled]="form.invalid || saving"
        [loading]="saving"
        (click)="save($event)"
      />
    </div>
  </ng-template>
</p-dialog>
